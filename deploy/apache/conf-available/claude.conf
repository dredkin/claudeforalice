   ServerName claude.dredkin.ru

    # Enable logs
    ErrorLog ${APACHE_LOG_DIR}/claude_error.log
    CustomLog ${APACHE_LOG_DIR}/claude_access.log combined

    # Make sure these modules are enabled:
    #   a2enmod proxy
    #   a2enmod proxy_http
    #   a2enmod proxy_wstunnel
    #   a2enmod headers
    # then restart apache2

    ProxyPreserveHost On
    ProxyRequests Off

    # Forward regular HTTP traffic
    ProxyPass        / http://127.0.0.1:37842/
    ProxyPassReverse / http://127.0.0.1:37842/

    # Forward WebSocket traffic (upgrade required)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:37842/$1 [P,L]

    ProxyPassMatch ^/(.*) http://127.0.0.1:37842/$1
